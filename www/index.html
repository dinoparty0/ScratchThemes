<!DOCTYPE html>
<html>
 <head>
 <title>Scratch Themes</title>
 </head>
  <style>
 body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #1e1e1e
 }
 .navigation {
  background-color: #242424;
  padding: 15px;
 }
 .navigation a {
  color: white;
  text-decoration: none;
  font-weight: bold;

   &:hover {
      color: #e3e3e3
   }

   &:visited {
      color:white
   }
 }
  
 .content {
  display: flex;
  gap: 15px;
  padding: 15px;
 }
 .card {
  background-color: #363636;
  color: white;
  padding: 15px;
  border-radius: 10px;
  width: 220px;
  transition: transform 0.2s ease
 }
 .card:hover {
  transform: translateY(-4px);
 }
 h3 {
  margin-top: 0;
 }
</style>
<body>
<div class="navigation">
<a href="/">Home</a>
</div>
<div class="content">
 <div class="card">
  <h3>Style your Scratch</h3>
  <p>Cusomize colors, themes, and layout for Scratch</p>
 </div>
 <div class="card">
  <h3>Upgrade your Scratch</h3>
  <p>Add useful tools to improve Scratch</p>
 </div>
</div>
</body>
</html>
