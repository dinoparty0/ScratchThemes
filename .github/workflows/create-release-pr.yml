name: Release System

on:
  push:
    branches:
      - staging
      - main

jobs:
  rolling-release-pr:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate Next SemVer Version via Labels
        id: get_version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date +'%Y-%m-%d')
          echo "RELEASE_DATE=$TODAY" >> $GITHUB_ENV
          
          LAST_PR_JSON=$(gh pr list --base main --head staging --state closed --search "release:" --limit 1 --json title,labels)
          
          if [ -z "$LAST_PR_JSON" ] || [ "$LAST_PR_JSON" = "[]" ]; then
            # No previous release PR found, start at 1.0.0
            NEXT_VERSION="1.0.0"
          else
            LAST_PR_TITLE=$(echo "$LAST_PR_JSON" | jq -r '.[0].title')
            # Extract labels into a lowercase string space-separated list
            PR_LABELS=$(echo "$LAST_PR_JSON" | jq -r '.[0].labels[].name' | tr '[:upper:]' '[:lower:]')
            
            CURRENT_VERSION=$(echo "$LAST_PR_TITLE" | sed -n 's/.*release: \[\([0-9.]*\).*/\1/p')
            
            if [ -z "$CURRENT_VERSION" ]; then
              NEXT_VERSION="1.0.0"
            else
              IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
              
              if [[ "$PR_LABELS" =~ "major" ]]; then
                # Major bump: 1.4.2 -> 2.0.0
                NEXT_MAJOR=$((major + 1))
                NEXT_VERSION="$NEXT_MAJOR.0.0"
              elif [[ "$PR_LABELS" =~ "minor" ]]; then
                # Minor bump: 1.4.2 -> 1.5.0
                NEXT_MINOR=$((minor + 1))
                NEXT_VERSION="$major.$NEXT_MINOR.0"
              else
                # Default Patch bump: 1.4.2 -> 1.4.3
                NEXT_PATCH=$((patch + 1))
                NEXT_VERSION="$major.$minor.$NEXT_PATCH"
              fi
            fi
          fi
          
          echo "RELEASE_VERSION=$NEXT_VERSION" >> $GITHUB_ENV

      - name: Check for Existing Open Release PR
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list --base main --head staging --json number --jq '.[0].number')
          echo "PR_NUMBER=$EXISTING_PR" >> $GITHUB_ENV

      - name: Generate Commit Log for PR
        id: gen_log
        run: |
          echo "COMMIT_LOG<<EOF" >> $GITHUB_OUTPUT
          git log origin/main..origin/staging --oneline --pretty=format:'* %h - %s (%an)' >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create One Rolling Release PR
        if: env.PR_NUMBER == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_LOG: ${{ steps.gen_log.outputs.COMMIT_LOG }}
        run: |
          gh pr create \
            --base main \
            --head staging \
            --title "release: [${{ env.RELEASE_VERSION }} (${{ env.RELEASE_DATE }})]" \
            --body "## All features merged into \`staging\` will show up here automatically.
          ### 🔀 Commits included in this release:
          $COMMIT_LOG"

      - name: Update Existing Release PR Body
        if: env.PR_NUMBER != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_LOG: ${{ steps.gen_log.outputs.COMMIT_LOG }}
        run: |
          gh pr edit ${{ env.PR_NUMBER }} \
            --body "All features merged into \`staging\` will show up here automatically.
          ### 🔀 Commits included in this release:
          $COMMIT_LOG"
          
  create-sidebar-release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Current Date and Changelog
        id: get_info
        run: |
          echo "RELEASE_TAG=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV
          echo "RELEASE_NAME=Release [$(date +'%Y-%m-%d')]" >> $GITHUB_ENV
          
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          
          echo "COMMIT_LOG<<EOF" >> $GITHUB_OUTPUT
          git log $LAST_TAG..HEAD --oneline --pretty=format:'* %h - %s (%an)' >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_LOG: ${{ steps.get_info.outputs.COMMIT_LOG }}
        run: |
          gh release create "${{ env.RELEASE_TAG }}" \
            --target main \
            --title "${{ env.RELEASE_NAME }}" \
            --notes "🚀 Production deployment successfully completed on $(date +'%Y-%m-%d').
            
            ### 📝 Changelog:
            $COMMIT_LOG"
