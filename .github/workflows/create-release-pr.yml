name: Release System

on:
  push:
    branches:
      - staging
      - main

jobs:
  rolling-release-pr:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0

      - name: Get Current Date
        id: get_date
        run: |
          echo "RELEASE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Check for Existing Open Release PR
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list --base main --head staging --json number --jq '.[0].number')
          echo "PR_NUMBER=$EXISTING_PR" >> $GITHUB_ENV

      - name: Create One Rolling Release PR
        if: env.PR_NUMBER == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head staging \
            --title "release: [${{ env.RELEASE_DATE }}]" \
            --body "## 📦 Release Bundle
            All features merged into \`staging\` will show up here automatically.
            
            ### 🛠️ Instructions:
            * Do NOT close this PR if you have more features coming.
            * When you are ready to push everything live, merge this PR into \`main\`!"

      - name: Alert on Existing PR Update
        if: env.PR_NUMBER != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ env.PR_NUMBER }} --body "🔄 New commits have been merged into \`staging\`."

  create-sidebar-release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Get Current Date
        id: get_date
        run: |
          echo "RELEASE_TAG=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV
          echo "RELEASE_NAME=Release [$(date +'%Y-%m-%d')]" >> $GITHUB_ENV

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.RELEASE_TAG }}" \
            --target main \
            --title "${{ env.RELEASE_NAME }}" \
            --notes "🚀 Production deployment successfully completed on $(date +'%Y-%m-%d'). All bundled features from staging are now live!"
