name: Create release branch and PRs

on:
  workflow_dispatch: 

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout develop branch
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Git User Info
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create Release Branch
        id: create_branch
        run: |
          # Create a unique timestamp string (e.g., release-2026-05-23_15-30)
          TIMESTAMP=$(date +'%Y-%m-%d_%H-%M')
          BRANCH_NAME="release/${TIMESTAMP}"
          
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          
          # Create the branch and push it upstream
          git checkout -b $BRANCH_NAME
          git push origin $BRANCH_NAME

      - name: Open Pull Request to Master using GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the 'gh' utility built into the runner to auto-generate the PR
          gh pr create \
            --base master \
            --head ${{ env.BRANCH_NAME }} \
            --title "🚀 Production Release: ${{ env.BRANCH_NAME }}" \
            --body "## 📦 What's New in this Release
            This is an automated release PR generated by the Release Pipeline. 
            
            ### 🛠️ Next Steps:
            1. Double-check staging/dev features.
            2. Run final tests.
            3. Approve and squash-merge this PR into \`master\` to push live!"
