name: Release System

on:
  push:
    branches:
      - staging
      - main

jobs:
  rolling-release-pr:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Current Date
        id: get_date
        run: |
          echo "RELEASE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Check for Existing Open Release PR
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list --base main --head staging --json number --jq '.[0].number')
          echo "PR_NUMBER=$EXISTING_PR" >> $GITHUB_ENV

      - name: Generate Commit Log for PR
        id: gen_log
        run: |
          # Use a multiline output to safely pass the git log without truncation or syntax breaks
          echo "COMMIT_LOG<<EOF" >> $GITHUB_OUTPUT
          git log origin/main..origin/staging --oneline --pretty=format:'* %h - %s (%an)' >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create One Rolling Release PR
        if: env.PR_NUMBER == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_LOG: ${{ steps.gen_log.outputs.COMMIT_LOG }}
        run: |
          gh pr create \
            --base main \
            --head staging \
            --title "release: [${{ env.RELEASE_DATE }}]" \
            --body "## 📦 Release Bundle
          All features merged into \`staging\` will show up here automatically.
          
          ### 🔀 Commits included in this release:
          $COMMIT_LOG
          
          ### 🛠️ Instructions:
          * Do NOT close this PR if you have more features coming.
          * When you are ready to push everything live, merge this PR into \`main\`!"

      - name: Update Existing Release PR Body
        if: env.PR_NUMBER != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_LOG: ${{ steps.gen_log.outputs.COMMIT_LOG }}
        run: |
          gh pr edit ${{ env.PR_NUMBER }} \
            --body "## 📦 Release Bundle
          All features merged into \`staging\` will show up here automatically.
          
          ### 🔀 Commits included in this release:
          $COMMIT_LOG
          
          ### 🛠️ Instructions:
          * Do NOT close this PR if you have more features coming.
          * When you are ready to push everything live, merge this PR into \`main\`!"

  create-sidebar-release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Current Date and Changelog
        id: get_info
        run: |
          echo "RELEASE_TAG=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV
          echo "RELEASE_NAME=Release [$(date +'%Y-%m-%d')]" >> $GITHUB_ENV
          
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          
          echo "COMMIT_LOG<<EOF" >> $GITHUB_OUTPUT
          git log $LAST_TAG..HEAD --oneline --pretty=format:'* %h - %s (%an)' >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_LOG: ${{ steps.get_info.outputs.COMMIT_LOG }}
        run: |
          gh release create "${{ env.RELEASE_TAG }}" \
            --target main \
            --title "${{ env.RELEASE_NAME }}" \
            --notes "🚀 Production deployment successfully completed on $(date +'%Y-%m-%d').
            
            ### 📝 Changelog:
            $COMMIT_LOG"
