name: Locked Production Release Pipeline

on:
  push:
    branches:
      - staging

jobs:
  rolling-release-pr:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0

      - name: Get Current Date
        id: get_date
        run: |
          echo "RELEASE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Check for Existing Open Release PR
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Look for an already open PR from staging into production
          EXISTING_PR=$(gh pr list --base production --head staging --json number --jq '.[0].number')
          echo "PR_NUMBER=$EXISTING_PR" >> $GITHUB_ENV

      - name: Create One Rolling Release PR
        if: env.PR_NUMBER == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Opens the single rolling release PR from staging into production
          gh pr create \
            --base production \
            --head staging \
            --title "release: [${{ env.RELEASE_DATE }}]" \
            --body "## 📦 Rolling Release Bundle
            This is the single rolling release PR. All features merged into \`staging\` will stack up here automatically.
            
            ### 🛠️ Instructions:
            * Do NOT close this PR if you have more features coming.
            * Your \`production\` branch code tab is completely hidden and safe right now!
            * When you are ready to push everything live, merge this PR into \`production\`!"

      - name: Alert on Existing PR Update
        if: env.PR_NUMBER != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # If the PR is already open, just log a comment.
          gh pr comment ${{ env.PR_NUMBER }} --body "🔄 New commits have been merged into \`staging\`. They have been automatically added to this rolling PR bundle!"
