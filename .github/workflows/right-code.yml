name: Code Review and Test

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main", "staging" ]

jobs:
  review-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    # Step 4: Run the ultimate code review (Lints HTML, CSS, and JS)
    - name: Run Code Linting (Review)
      run: npm run lint
      continue-on-error: false
